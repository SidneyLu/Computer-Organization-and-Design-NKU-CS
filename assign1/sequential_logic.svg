<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05111f"/>
      <stop offset="60%" stop-color="#0a2033"/>
      <stop offset="100%" stop-color="#091725"/>
    </linearGradient>
    <filter id="shadow4" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#01070d" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #e0f6ff; }
      .title { font-size: 36px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #8ec7de; }
      .boxTitle { font-size: 26px; font-weight: 700; }
      .body { font-size: 19px; fill: #d8ecf6; }
      .small { font-size: 16px; fill: #8fbdd4; }
      .chip { font-size: 17px; font-weight: 700; fill: #99f5ff; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="url(#bg4)"/>
  <rect width="1200" height="900" fill="url(#grid4)"/>
  <circle cx="1040" cy="110" r="110" fill="#22d3ee" opacity="0.05"/>

  <text x="70" y="82" class="title">时序逻辑电路</text>
  <text x="70" y="118" class="subtitle">输出既受当前输入影响，也和过去保存的状态有关</text>

  <rect x="70" y="160" width="1060" height="240" rx="28" ry="28" fill="#0d2135" stroke="#49ddff" stroke-opacity="0.38" stroke-width="2" filter="url(#shadow4)"/>
  <text x="100" y="210" class="boxTitle">核心特征</text>
  <rect x="110" y="245" width="180" height="70" rx="20" ry="20" fill="#152537" stroke="#ff9f7a" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="200" y="288" text-anchor="middle" class="chip">当前输入</text>
  <line x1="290" y1="280" x2="360" y2="280" stroke="#4fe3ff" stroke-width="6" stroke-linecap="round"/>
  <rect x="360" y="225" width="220" height="110" rx="22" ry="22" fill="#10263a" stroke="#4fe3ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="470" y="274" text-anchor="middle" class="chip">组合逻辑</text>
  <text x="470" y="305" text-anchor="middle" class="small">决定下一状态</text>
  <line x1="580" y1="280" x2="640" y2="280" stroke="#4fe3ff" stroke-width="6" stroke-linecap="round"/>
  <rect x="640" y="225" width="220" height="110" rx="22" ry="22" fill="#112c36" stroke="#5df3c0" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="750" y="274" text-anchor="middle" class="chip">存储单元</text>
  <text x="750" y="305" text-anchor="middle" class="small">触发器 / 寄存器</text>
  <line x1="860" y1="280" x2="930" y2="280" stroke="#4fe3ff" stroke-width="6" stroke-linecap="round"/>
  <text x="965" y="286" class="chip">输出</text>
  <path d="M750 335 Q750 380 610 380 Q480 380 480 335" fill="none" stroke="#ff9f7a" stroke-width="6"/>
  <text x="110" y="360" class="body">1. 有反馈路径，能保存上一时刻的状态。</text>
  <text x="110" y="392" class="body">2. 常受时钟信号控制，在固定时刻更新。</text>

  <rect x="70" y="450" width="500" height="300" rx="28" ry="28" fill="#0e2339" stroke="#4fe3ff" stroke-opacity="0.38" stroke-width="2" filter="url(#shadow4)"/>
  <text x="105" y="498" class="boxTitle">为什么像“会记事”</text>
  <circle cx="165" cy="595" r="52" fill="#10263a" stroke="#4fe3ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="603" text-anchor="middle" class="chip">状态</text>
  <line x1="217" y1="595" x2="305" y2="595" stroke="#4fe3ff" stroke-width="6" stroke-linecap="round"/>
  <polygon points="305,595 286,584 286,606" fill="#4fe3ff"/>
  <rect x="315" y="555" width="180" height="80" rx="18" ry="18" fill="#10263a" stroke="#4fe3ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="405" y="603" text-anchor="middle" class="chip">下一次更新</text>
  <text x="105" y="675" class="body">即使输入暂时消失，电路也能保留先前结果。</text>
  <text x="105" y="710" class="small">因此能实现计数、存储、状态切换等功能。</text>

  <rect x="630" y="450" width="500" height="300" rx="28" ry="28" fill="#142436" stroke="#ffb86c" stroke-opacity="0.36" stroke-width="2" filter="url(#shadow4)"/>
  <text x="665" y="498" class="boxTitle">典型应用</text>
  <rect x="668" y="530" width="196" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="765" y="575" text-anchor="middle" class="chip">计数器</text>
  <rect x="886" y="530" width="198" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="985" y="575" text-anchor="middle" class="chip">寄存器</text>
  <rect x="668" y="630" width="196" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="765" y="675" text-anchor="middle" class="chip">时钟控制系统</text>
  <rect x="886" y="630" width="198" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="985" y="675" text-anchor="middle" class="chip">状态机</text>
  <text x="665" y="725" class="body">适合“按步骤运行、需要记忆历史”的数字系统。</text>

  <rect x="70" y="790" width="1060" height="58" rx="18" ry="18" fill="#0d2135" stroke="#58d8ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="95" y="826" class="small">一句话理解：时序逻辑电路既看现在，也记得过去</text>
</svg>
