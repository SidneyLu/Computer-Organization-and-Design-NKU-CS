<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05111f"/>
      <stop offset="55%" stop-color="#0a1f34"/>
      <stop offset="100%" stop-color="#091726"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2238" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#122d48" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2236" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#133a45" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="panelOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101f34" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#3c2b35" stop-opacity="0.88"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#47d7ff" flood-opacity="0.35"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#01070d" flood-opacity="0.45"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #dff7ff; }
      .title { font-size: 36px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #8ecae6; }
      .cardTitle { font-size: 26px; font-weight: 700; }
      .section { font-size: 18px; font-weight: 700; fill: #6ae7ff; }
      .body { font-size: 17px; fill: #d6ebf6; }
      .truth { font-size: 16px; font-weight: 700; fill: #9af5ff; }
      .pin { font-size: 18px; font-weight: 700; fill: #f4fcff; }
      .footer { font-size: 15px; fill: #8cbdd4; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="url(#bg1)"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <circle cx="1060" cy="110" r="120" fill="#22d3ee" opacity="0.06"/>
  <circle cx="120" cy="760" r="140" fill="#34d399" opacity="0.06"/>

  <text x="70" y="82" class="title">三个基本逻辑门</text>
  <text x="70" y="118" class="subtitle">基础数字电路中的核心判断单元</text>

  <rect x="60" y="160" width="340" height="640" rx="28" ry="28" fill="url(#panelBlue)" stroke="#48dbff" stroke-opacity="0.5" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="430" y="160" width="340" height="640" rx="28" ry="28" fill="url(#panelGreen)" stroke="#58f7c2" stroke-opacity="0.45" stroke-width="2" filter="url(#softShadow)"/>
  <rect x="800" y="160" width="340" height="640" rx="28" ry="28" fill="url(#panelOrange)" stroke="#ff8fab" stroke-opacity="0.42" stroke-width="2" filter="url(#softShadow)"/>

  <text x="230" y="215" text-anchor="middle" class="cardTitle">与门 AND</text>
  <path d="M180 250 L240 250 A80 80 0 0 1 240 410 L180 410 Z" fill="#081624" stroke="#f7fdff" stroke-width="6.5" filter="url(#glow)"/>
  <line x1="88" y1="300" x2="180" y2="300" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="88" y1="360" x2="180" y2="360" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="320" y1="330" x2="385" y2="330" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <text x="95" y="306" class="pin">A</text>
  <text x="95" y="366" class="pin">B</text>
  <text x="378" y="337" class="pin">Y</text>
  <text x="92" y="470" class="section">特征</text>
  <text x="92" y="505" class="body">所有输入都为 1 时，输出才为 1。</text>
  <text x="92" y="555" class="section">功能</text>
  <text x="92" y="590" class="body">表示“条件同时满足”。</text>
  <text x="92" y="620" class="body">常见于联锁控制、权限判定。</text>
  <text x="92" y="680" class="section">真值关系</text>
  <text x="92" y="715" class="truth">00→0   01→0   10→0   11→1</text>

  <text x="600" y="215" text-anchor="middle" class="cardTitle">或门 OR</text>
  <path d="M525 250 Q585 330 525 410" fill="none" stroke="#f7fdff" stroke-width="6.5" filter="url(#glow)"/>
  <path d="M535 250 Q640 250 700 330 Q640 410 535 410" fill="#081824" stroke="#f7fdff" stroke-width="6.5" filter="url(#glow)"/>
  <line x1="448" y1="300" x2="536" y2="300" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="448" y1="360" x2="536" y2="360" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="700" y1="330" x2="756" y2="330" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <text x="452" y="306" class="pin">A</text>
  <text x="452" y="366" class="pin">B</text>
  <text x="747" y="337" class="pin">Y</text>
  <text x="462" y="470" class="section">特征</text>
  <text x="462" y="505" class="body">任意一个输入为 1，输出就是 1。</text>
  <text x="462" y="555" class="section">功能</text>
  <text x="462" y="590" class="body">表示“满足其一即可”。</text>
  <text x="462" y="620" class="body">常见于多路触发、应急启动。</text>
  <text x="462" y="680" class="section">真值关系</text>
  <text x="462" y="715" class="truth">00→0   01→1   10→1   11→1</text>

  <text x="970" y="215" text-anchor="middle" class="cardTitle">非门 NOT</text>
  <path d="M920 260 L920 400 L1010 330 Z" fill="#101725" stroke="#f7fdff" stroke-width="6.5" filter="url(#glow)"/>
  <circle cx="1030" cy="330" r="16" fill="#101725" stroke="#f7fdff" stroke-width="6.5" filter="url(#glow)"/>
  <line x1="842" y1="330" x2="920" y2="330" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <line x1="1046" y1="330" x2="1102" y2="330" stroke="#f7fdff" stroke-width="7.5" stroke-linecap="round" filter="url(#glow)"/>
  <text x="842" y="337" class="pin">A</text>
  <text x="1096" y="337" class="pin">Y</text>
  <text x="832" y="470" class="section">特征</text>
  <text x="832" y="505" class="body">输出与输入相反，1 变 0，0 变 1。</text>
  <text x="832" y="555" class="section">功能</text>
  <text x="832" y="590" class="body">用于反相、取反、信号翻转。</text>
  <text x="832" y="620" class="body">是实现复杂逻辑的重要基础。</text>
  <text x="832" y="680" class="section">真值关系</text>
  <text x="832" y="715" class="truth">0→1   1→0</text>

  <rect x="70" y="820" width="1060" height="48" rx="16" ry="16" fill="#0d2135" stroke="#58d8ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="95" y="851" class="footer">记忆口诀：AND 看“全部满足”，OR 看“至少一个”，NOT 看“结果相反”</text>
</svg>
