<svg width="1200" height="900" viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05111f"/>
      <stop offset="60%" stop-color="#0a2033"/>
      <stop offset="100%" stop-color="#091725"/>
    </linearGradient>
    <filter id="shadow3" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#01070d" flood-opacity="0.42"/>
    </filter>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#7dd3fc" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      text { font-family: "Microsoft YaHei", "Noto Sans SC", sans-serif; fill: #e0f6ff; }
      .title { font-size: 36px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #8ec7de; }
      .boxTitle { font-size: 26px; font-weight: 700; }
      .body { font-size: 19px; fill: #d8ecf6; }
      .small { font-size: 16px; fill: #8fbdd4; }
      .chip { font-size: 17px; font-weight: 700; fill: #99f5ff; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="url(#bg3)"/>
  <rect width="1200" height="900" fill="url(#grid3)"/>
  <circle cx="1050" cy="110" r="110" fill="#22d3ee" opacity="0.05"/>

  <text x="70" y="82" class="title">组合逻辑电路</text>
  <text x="70" y="118" class="subtitle">输出只由当前输入决定，本身不保存历史状态</text>

  <rect x="70" y="160" width="1060" height="220" rx="28" ry="28" fill="#0d2135" stroke="#49ddff" stroke-opacity="0.38" stroke-width="2" filter="url(#shadow3)"/>
  <text x="100" y="210" class="boxTitle">核心特点</text>
  <line x1="110" y1="250" x2="290" y2="250" stroke="#5df3c0" stroke-width="10" stroke-linecap="round"/>
  <rect x="310" y="215" width="260" height="70" rx="22" ry="22" fill="#112c36" stroke="#5df3c0" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="440" y="259" text-anchor="middle" class="chip">逻辑运算网络</text>
  <line x1="570" y1="250" x2="750" y2="250" stroke="#4fe3ff" stroke-width="10" stroke-linecap="round"/>
  <text x="110" y="322" class="body">1. 输入变化后，输出会立即跟着变化。</text>
  <text x="110" y="356" class="body">2. 电路没有记忆，不保留过去的运算结果。</text>

  <rect x="70" y="420" width="500" height="330" rx="28" ry="28" fill="#0e2339" stroke="#4fe3ff" stroke-opacity="0.38" stroke-width="2" filter="url(#shadow3)"/>
  <text x="105" y="468" class="boxTitle">工作方式</text>
  <rect x="110" y="510" width="150" height="60" rx="18" ry="18" fill="#102236" stroke="#4fe3ff" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="185" y="548" text-anchor="middle" class="chip">输入信号</text>
  <line x1="260" y1="540" x2="330" y2="540" stroke="#4fe3ff" stroke-width="6" stroke-linecap="round"/>
  <rect x="330" y="490" width="180" height="100" rx="22" ry="22" fill="#10263a" stroke="#4fe3ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="420" y="548" text-anchor="middle" class="chip">组合逻辑</text>
  <line x1="510" y1="540" x2="540" y2="540" stroke="#4fe3ff" stroke-width="6" stroke-linecap="round"/>
  <rect x="540" y="510" width="120" height="60" rx="18" ry="18" fill="#102236" stroke="#4fe3ff" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="600" y="548" text-anchor="middle" class="chip">输出</text>
  <text x="105" y="635" class="body">像“即时计算器”，只根据眼前输入给出结果。</text>
  <text x="105" y="675" class="small">常见形式：编码器、译码器、加法器、数据选择器</text>

  <rect x="630" y="420" width="500" height="330" rx="28" ry="28" fill="#142436" stroke="#ffb86c" stroke-opacity="0.36" stroke-width="2" filter="url(#shadow3)"/>
  <text x="665" y="468" class="boxTitle">典型应用</text>
  <rect x="668" y="505" width="196" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="765" y="550" text-anchor="middle" class="chip">二进制加法器</text>
  <rect x="886" y="505" width="198" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="985" y="550" text-anchor="middle" class="chip">数字译码器</text>
  <rect x="668" y="605" width="196" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="765" y="650" text-anchor="middle" class="chip">数据选择器</text>
  <rect x="886" y="605" width="198" height="70" rx="18" ry="18" fill="#182436" stroke="#ffb86c" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="985" y="650" text-anchor="middle" class="chip">比较器</text>
  <text x="665" y="715" class="body">适合做“即时判断”和“当前运算”类任务。</text>

  <rect x="70" y="790" width="1060" height="58" rx="18" ry="18" fill="#0d2135" stroke="#58d8ff" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="95" y="826" class="small">一句话理解：组合逻辑电路只关心现在，不记得过去</text>
</svg>
